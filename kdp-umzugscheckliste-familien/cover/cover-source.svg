  <rect x="459" y="696.6" width="144" height="86.39999999999999" fill="#ffffff" />

  
    <text x="53" y="223" font-size="20" fill="#23303a" font-family="Montserrat, Arial, sans-serif" font-weight="700">
      <tspan x="53" dy="0">Ein Umzug mit Kindern muss</tspan><tspan x="53" dy="24">nicht chaotisch sein.</tspan>
    </text>
  
      <text x="53" y="275" font-size="13.8" fill="#55616b" font-family="Montserrat, Arial, sans-serif">
        <tspan x="53" dy="0">Ein Umzug mit Kindern bringt viele Aufgaben,</tspan><tspan x="53" dy="18">Termine und kleine Details mit sich. Dieser</tspan><tspan x="53" dy="18">praktische Umzugsplaner hilft Familien</tspan><tspan x="53" dy="18">dabei, den Überblick zu behalten und den</tspan><tspan x="53" dy="18">Umzug Schritt für Schritt zu organisieren.</tspan>
      </text>
      <text x="53" y="378.8" font-size="13.8" fill="#55616b" font-family="Montserrat, Arial, sans-serif">
        <tspan x="53" dy="0">Enthalten sind Wochen-Checklisten,</tspan><tspan x="53" dy="18">Packlisten für jedes Zimmer, Budgetseiten,</tspan><tspan x="53" dy="18">Adressänderungen, Kinder-Checklisten,</tspan><tspan x="53" dy="18">Notfalltaschen, Erste-Nacht-Planung und</tspan><tspan x="53" dy="18">Übergabeprotokolle.</tspan>
      </text>
      <text x="53" y="482.6" font-size="13.8" fill="#55616b" font-family="Montserrat, Arial, sans-serif">
        <tspan x="53" dy="0">Ideal für Familien, die ihren Umzug</tspan><tspan x="53" dy="18">strukturierter, ruhiger und besser</tspan><tspan x="53" dy="18">vorbereitet angehen möchten.</tspan>
      </text>

  <rect x="686.187264" y="127" width="148" height="25" rx="12" fill="#ffffff" stroke="#d1c6b8" stroke-width="1.2" />
  <text x="704.187264" y="145" font-size="11" fill="#55616b" font-family="Montserrat, Arial, sans-serif" font-weight="700" letter-spacing="1.3">FAMILIENPLANER</text>

  
    <text x="686.187264" y="215" font-size="35" fill="#23303a" font-family="Montserrat, Arial, sans-serif" font-weight="700">
      <tspan x="686.187264" dy="0">Umzugscheckliste</tspan>
      <tspan x="686.187264" dy="41">für Familien</tspan>
    </text>
  
    <text x="686.187264" y="313" font-size="16.8" fill="#55616b" font-family="Montserrat, Arial, sans-serif" font-weight="400">
      <tspan x="686.187264" dy="0">Der praktische Umzugsplaner für</tspan><tspan x="686.187264" dy="21">einen stressfreien Umzug mit</tspan><tspan x="686.187264" dy="21">Kindern</tspan>
    </text>

  <path d="M 686.187264 673 H 1116.1872640000001" stroke="#d1c6b8" stroke-width="1.5" />
  
    <text x="686.187264" y="699" font-size="13" fill="#23303a" font-family="Montserrat, Arial, sans-serif" font-weight="600">
      <tspan x="686.187264" dy="0">Mit Wochenplan, Packlisten, Budgetplaner, Adressänderungen,</tspan><tspan x="686.187264" dy="17">Kinder-Checklisten und Übergabeprotokoll</tspan>
    </text>

  <text x="686.187264" y="775" font-size="13.5" fill="#55616b" font-family="Montserrat, Arial, sans-serif" font-weight="600">Planvoll Familie</text>
