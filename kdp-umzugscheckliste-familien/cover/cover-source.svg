  <rect x="459" y="696.6" width="144" height="86.39999999999999" fill="#ffffff" />

  
    <text x="61" y="264" font-size="20" fill="#23303a" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" font-weight="700">
      <tspan x="61" dy="0">Ein Umzug mit Kindern muss nicht</tspan><tspan x="61" dy="24">chaotisch sein.</tspan>
    </text>
  
      <text x="61" y="309" font-size="14" fill="#5f6b74" font-family="Segoe UI, Arial, sans-serif">
        <tspan x="61" dy="0">Ein Umzug mit Kindern bringt viele Aufgaben,</tspan><tspan x="61" dy="18">Termine und kleine Details mit sich. Dieser</tspan><tspan x="61" dy="18">praktische Umzugsplaner hilft Familien dabei,</tspan><tspan x="61" dy="18">den Überblick zu behalten und den Umzug Schritt</tspan><tspan x="61" dy="18">für Schritt zu organisieren.</tspan>
      </text>
      <text x="61" y="413" font-size="14" fill="#5f6b74" font-family="Segoe UI, Arial, sans-serif">
        <tspan x="61" dy="0">Enthalten sind Wochen-Checklisten, Packlisten</tspan><tspan x="61" dy="18">für jedes Zimmer, Budgetseiten,</tspan><tspan x="61" dy="18">Adressänderungen, Kinder-Checklisten,</tspan><tspan x="61" dy="18">Notfalltaschen, Erste-Nacht-Planung und</tspan><tspan x="61" dy="18">Übergabeprotokolle.</tspan>
      </text>
      <text x="61" y="517" font-size="14" fill="#5f6b74" font-family="Segoe UI, Arial, sans-serif">
        <tspan x="61" dy="0">Ideal für Familien, die ihren Umzug</tspan><tspan x="61" dy="18">strukturierter, ruhiger und besser vorbereitet</tspan><tspan x="61" dy="18">angehen möchten.</tspan>
      </text>

  <rect x="697.754432" y="127" width="136" height="24" rx="12" fill="#ffffff" stroke="#d3cabd" stroke-width="1.2" />
  <text x="715.754432" y="144" font-size="11" fill="#5f6b74" font-family="Segoe UI, Arial, sans-serif" font-weight="700" letter-spacing="1.6">FAMILIENPLANER</text>

  
    <text x="697.754432" y="237" font-size="36" fill="#23303a" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" font-weight="700">
      <tspan x="697.754432" dy="0">Umzugscheckliste</tspan>
      <tspan x="697.754432" dy="42">für Familien</tspan>
    </text>
  
    <text x="697.754432" y="337" font-size="18" fill="#5f6b74" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" font-weight="400">
      <tspan x="697.754432" dy="0">Der praktische Umzugsplaner für einen</tspan><tspan x="697.754432" dy="22">stressfreien Umzug mit Kindern</tspan>
    </text>

  <rect x="697.754432" y="719" width="462" height="86" rx="12" fill="#ffffff" stroke="#d3cabd" stroke-width="1.5" />
  
    <text x="717.754432" y="749" font-size="13" fill="#23303a" font-family="Trebuchet MS, Segoe UI, Arial, sans-serif" font-weight="600">
      <tspan x="717.754432" dy="0">Mit Wochenplan, Packlisten, Budgetplaner,</tspan><tspan x="717.754432" dy="17">Adressänderungen, Kinder-Checklisten und Übergabeprotokoll</tspan>
    </text>

  <text x="697.754432" y="835" font-size="14" fill="#5f6b74" font-family="Segoe UI, Arial, sans-serif" font-weight="600">Planvoll Familie</text>

