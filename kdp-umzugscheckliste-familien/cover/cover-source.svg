  <rect x="459" y="696.6" width="144" height="86.39999999999999" fill="#ffffff" />

  
    <text x="53" y="265" font-size="20" fill="#23303a" font-family="Montserrat, Arial, sans-serif" font-weight="700">
      <tspan x="53" dy="0">Ein Umzug mit Kindern muss</tspan><tspan x="53" dy="24">nicht chaotisch sein.</tspan>
    </text>
  
      <text x="53" y="313" font-size="13.8" fill="#55616b" font-family="Montserrat, Arial, sans-serif">
        <tspan x="53" dy="0">Ein Umzug mit Kindern bringt viele Aufgaben,</tspan><tspan x="53" dy="18">Termine und kleine Details mit sich. Dieser</tspan><tspan x="53" dy="18">praktische Umzugsplaner hilft Familien dabei,</tspan><tspan x="53" dy="18">den Überblick zu behalten und den Umzug</tspan><tspan x="53" dy="18">Schritt für Schritt zu organisieren.</tspan>
      </text>
      <text x="53" y="416.8" font-size="13.8" fill="#55616b" font-family="Montserrat, Arial, sans-serif">
        <tspan x="53" dy="0">Enthalten sind Wochen-Checklisten, Packlisten</tspan><tspan x="53" dy="18">für jedes Zimmer, Budgetseiten,</tspan><tspan x="53" dy="18">Adressänderungen, Kinder-Checklisten,</tspan><tspan x="53" dy="18">Notfalltaschen, Erste-Nacht-Planung und</tspan><tspan x="53" dy="18">Übergabeprotokolle.</tspan>
      </text>
      <text x="53" y="520.6" font-size="13.8" fill="#55616b" font-family="Montserrat, Arial, sans-serif">
        <tspan x="53" dy="0">Ideal für Familien, die ihren Umzug</tspan><tspan x="53" dy="18">strukturierter, ruhiger und besser</tspan><tspan x="53" dy="18">vorbereitet angehen möchten.</tspan>
      </text>

  <rect x="688.187264" y="127" width="148" height="25" rx="12" fill="#ffffff" stroke="#d1c6b8" stroke-width="1.2" />
  <text x="706.187264" y="145" font-size="11" fill="#55616b" font-family="Montserrat, Arial, sans-serif" font-weight="700" letter-spacing="1.3">FAMILIENPLANER</text>

  
    <text x="688.187264" y="215" font-size="35" fill="#23303a" font-family="Montserrat, Arial, sans-serif" font-weight="700">
      <tspan x="688.187264" dy="0">Umzugscheckliste</tspan>
      <tspan x="688.187264" dy="41">für Familien</tspan>
    </text>
  
    <text x="688.187264" y="321" font-size="18" fill="#55616b" font-family="Montserrat, Arial, sans-serif" font-weight="400">
      <tspan x="688.187264" dy="0">Der praktische Umzugsplaner für einen</tspan><tspan x="688.187264" dy="22">stressfreien Umzug mit Kindern</tspan>
    </text>

  <rect x="688.187264" y="677" width="438" height="84" rx="12" fill="#ffffff" stroke="#d1c6b8" stroke-width="1.5" />
  
    <text x="708.187264" y="707" font-size="13" fill="#23303a" font-family="Montserrat, Arial, sans-serif" font-weight="600">
      <tspan x="708.187264" dy="0">Mit Wochenplan, Packlisten, Budgetplaner,</tspan><tspan x="708.187264" dy="17">Adressänderungen, Kinder-Checklisten und</tspan><tspan x="708.187264" dy="17">Übergabeprotokoll</tspan>
    </text>

  <text x="688.187264" y="775" font-size="13.5" fill="#55616b" font-family="Montserrat, Arial, sans-serif" font-weight="600">Planvoll Familie</text>
