<section class="page data-page">
  <div class="page-content">
    <header class="page-header">
      <div class="section-label">{{sectionLabel}}</div>
      <h1>{{title}}</h1>
      <p class="subtitle">{{intro}}</p>
    </header>
    <div class="data-callout">Bereich: {{room}}</div>
    <div class="packlist-head">
      <div>Gegenstand / Kategorie</div>
      <div>Karton</div>
      <div>Priorität</div>
      <div>Zielraum</div>
      <div>Notizen</div>
    </div>
    <div class="packlist-table">
      {{rows}}
    </div>
    <div class="notes-box compact fill">
      <div class="field-label">Weitere Kartons / Hinweise</div>
    </div>
  </div>
  {{footer}}
</section>
