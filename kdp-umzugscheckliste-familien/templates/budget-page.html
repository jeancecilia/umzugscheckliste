<section class="page data-page">
  <div class="page-content">
    <header class="page-header">
      <div class="section-label">{{sectionLabel}}</div>
      <h1>{{title}}</h1>
      <p class="subtitle">{{intro}}</p>
    </header>
    <div class="budget-head">
      <div>Kategorie</div>
      <div>Geplant</div>
      <div>Ist</div>
      <div>Bez.</div>
      <div>Beleg</div>
      <div>Notizen</div>
    </div>
    <div class="budget-table">
      {{rows}}
    </div>
    <div class="data-bottom two-up">
      <div class="notes-box medium lined">
        <div class="field-label">{{leftLabel}}</div>
      </div>
      <div class="notes-box medium lined">
        <div class="field-label">{{rightLabel}}</div>
      </div>
    </div>
  </div>
  {{footer}}
</section>
