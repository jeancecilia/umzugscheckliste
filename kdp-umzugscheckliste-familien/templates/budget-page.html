<section class="page data-page">

    <header class="page-header">
      <div class="section-label">{{sectionLabel}}</div>
      <h1>{{title}}</h1>
      <p class="subtitle">{{intro}}</p>
    </header>
    <div class="budget-head">
      <div>Kategorie</div>
      <div>Geplant</div>
      <div>Ist</div>
      <div>Bezahlt</div>
      <div>Beleg</div>
      <div>Notizen</div>

    <div class="budget-table">

    </div>
    <div class="data-bottom two-up">
      {{leftNotesBox}}
      {{rightNotesBox}}
    </div>
  </div>
  {{footer}}
</section>
