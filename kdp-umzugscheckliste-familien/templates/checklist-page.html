<section class="page checklist-page">
  <div class="page-content">
    <header class="page-header">
      <div class="section-label">{{sectionLabel}}</div>
      <h1>{{title}}</h1>
      <p class="subtitle">{{intro}}</p>
    </header>
    <div class="checklist-table">
      {{rows}}
    </div>
    <div class="field-block">
      <div class="field-label">{{focusLabel}}</div>
      <div class="field-line field-copy">{{focusText}}</div>
    </div>
    <div class="notes-box fill">
      <div class="field-label">{{notesLabel}}</div>
    </div>
  </div>
  {{footer}}
</section>
