<section class="page snapshot-page">
  <div class="page-content">
    <header class="page-header">
      <div class="section-label">{{sectionLabel}}</div>
      <h1>{{title}}</h1>
      <p class="subtitle">{{intro}}</p>
    </header>
    <div class="snapshot-grid">
      {{cards}}
    </div>
    <div class="notes-box fill lined">
      <div class="field-label">{{notesLabel}}</div>
    </div>
  </div>
  {{footer}}
</section>
