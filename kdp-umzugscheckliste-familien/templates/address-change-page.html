<section class="page data-page">
  <div class="page-content">
    <header class="page-header">
      <div class="section-label">{{sectionLabel}}</div>
      <h1>{{title}}</h1>
      <p class="subtitle">{{intro}}</p>
    </header>
    <div class="address-head">
      <div>Stelle / Kontakt</div>
      <div>Aktualisiert</div>
      <div>Bestätigt</div>
      <div>Notizen</div>
    </div>
    <div class="address-table">
      {{rows}}
    </div>
    <div class="data-bottom two-up">
      {{leftNotesBox}}
      {{rightNotesBox}}
    </div>
  </div>
  {{footer}}
</section>
