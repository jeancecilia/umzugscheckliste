<section class="page family-guide-page">
  <div class="page-content">
    <header class="page-header">
      <div class="section-label">{{sectionLabel}}</div>
      <h1>{{title}}</h1>
      <p class="subtitle">{{intro}}</p>
    </header>
    <div class="prompt-grid avoid-break">
      {{prompts}}
    </div>
    <div class="checklist-table family-list">
      {{rows}}
    </div>
    <div class="notes-box fill">
      <div class="field-label">{{notesLabel}}</div>
    </div>
  </div>
  {{footer}}
</section>
