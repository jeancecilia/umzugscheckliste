<section class="page journal-page">
  <div class="page-content">
    <header class="page-header">
      <div class="section-label">{{sectionLabel}}</div>
      <h1>{{title}}</h1>
      <p class="subtitle">{{intro}}</p>
    </header>
    <div class="prompt-grid avoid-break">
      {{prompts}}
    </div>
    <div class="notes-lines journal-lines">
      {{lines}}
    </div>
  </div>
  {{footer}}
</section>
