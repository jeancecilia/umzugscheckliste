<section class="page divider-page">
  <div class="page-content divider-content">
    <div class="divider-topline">
      <div class="divider-mark">{{motif}}</div>
      <div class="divider-section-tag">{{sectionTag}}</div>
    </div>
    <div class="divider-emblem" aria-hidden="true">
      <span class="divider-box divider-box-a"></span>
      <span class="divider-box divider-box-b"></span>
      <span class="divider-check"></span>
    </div>
    <h1>{{title}}</h1>
    <p class="subtitle">{{description}}</p>
    <div class="divider-panel">
      <div class="subheading">In diesem Abschnitt</div>
      <ul class="divider-list">
        {{highlights}}
      </ul>
    </div>
  </div>
  {{footer}}
</section>
