<section class="page data-page custom-table-page">
  <div class="page-content">
    <header class="page-header">
      <div class="section-label">{{sectionLabel}}</div>
      <h1>{{title}}</h1>
      <p class="subtitle">{{intro}}</p>
    </header>
    {{callout}}
    <div class="custom-table {{tableVariant}}" style="--table-columns: {{columnLayout}}">
      <div class="custom-table-head">
        {{head}}
      </div>
      <div class="custom-table-body">
        {{rows}}
      </div>
    </div>
    <div class="data-bottom two-up">
      <div class="notes-box medium lined">
        <div class="field-label">{{leftLabel}}</div>
      </div>
      <div class="notes-box medium lined">
        <div class="field-label">{{rightLabel}}</div>
      </div>
    </div>
  </div>
  {{footer}}
</section>
