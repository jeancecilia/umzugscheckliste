<section class="page contacts-page">
  <div class="page-content">
    <header class="page-header">
      <div class="section-label">{{sectionLabel}}</div>
      <h1>{{title}}</h1>
      <p class="subtitle">{{intro}}</p>
    </header>
    <div class="contacts-head">
      <div>Name / Stelle</div>
      <div>Rolle</div>
      <div>Telefon / E-Mail</div>
      <div>Notizen</div>
    </div>
    <div class="contacts-table">
      {{rows}}
    </div>
    <div class="notes-box fill lined">
      <div class="field-label">{{notesLabel}}</div>
    </div>
  </div>
  {{footer}}
</section>
