<section class="page data-page">
  <div class="page-content">
    <header class="page-header">
      <div class="section-label">{{sectionLabel}}</div>
      <h1>{{title}}</h1>
      <p class="subtitle">{{intro}}</p>
    </header>
    <div class="handover-head">
      <div>Bereich</div>
      <div>Zustand / Mängel</div>
      <div>Foto</div>
      <div>Maßnahme / Frist</div>
      <div>Notizen</div>
    </div>
    <div class="handover-table">
      {{rows}}
    </div>
    <div class="data-bottom two-up">
      {{leftNotesBox}}
      {{rightNotesBox}}
    </div>
  </div>
  {{footer}}
</section>
