<section class="page family-profile-page">
  <div class="page-content">
    <header class="page-header">
      <div class="section-label">{{sectionLabel}}</div>
      <h1>{{title}}</h1>
      <p class="subtitle">{{intro}}</p>
    </header>
    <div class="profile-grid avoid-break">
      {{fields}}
    </div>
    <div class="profile-bottom">
      <div class="notes-box medium lined">
        <div class="field-label">Was hilft beim Ankommen?</div>
      </div>
      <div class="notes-box medium lined">
        <div class="field-label">Wichtige Kontakte / Freundschaften</div>
      </div>
    </div>
  </div>
  {{footer}}
</section>
