<section class="page howto-page">
  <div class="page-content">
    <header class="page-header">
      <div class="section-label">{{sectionLabel}}</div>
      <h1>{{title}}</h1>
      <p class="subtitle">{{intro}}</p>
    </header>
    <div class="howto-steps-block avoid-break">
      <div class="subheading">So nutzt ihr den Planer</div>
      <div class="steps-list wide">
        {{steps}}
      </div>
    </div>
    <div class="howto-structure-block avoid-break">
      <div class="subheading">So ist der Planer aufgebaut</div>
      <div class="contents-grid howto-sections">
        {{sections}}
      </div>
    </div>
    <div class="tip-box">{{note}}</div>
  </div>
  {{footer}}
</section>
