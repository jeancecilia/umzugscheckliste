<section class="page howto-page howto-editorial-page">
  <div class="page-content">
    <header class="howto-editorial-header">
      <div class="howto-editorial-titleblock">
        <div class="section-label">{{sectionLabel}}</div>
        <h1>{{title}}</h1>
      </div>
    </header>
    <div class="howto-editorial-subtitle">
      <p class="subtitle">{{intro}}</p>
    </div>
    <div class="howto-editorial-rule"></div>
    <section class="howto-editorial-steps-block avoid-break">
      <div class="subheading">So nutzt ihr den Planer</div>
      <div class="howto-editorial-steps-grid">
        {{steps}}
      </div>
    </section>
    <div class="howto-editorial-note">{{note}}</div>
    <div class="howto-editorial-handoff">Die komplette Abschnitts&uuml;bersicht mit Seitenbereichen folgt auf der n&auml;chsten Seite.</div>
    <footer class="howto-editorial-footer">
      <div class="howto-editorial-footer-left">Journal f&uuml;r den Familienumzug</div>
      <div class="howto-editorial-footer-right">&copy; {{brandName}}</div>
    </footer>
  </div>
</section>
