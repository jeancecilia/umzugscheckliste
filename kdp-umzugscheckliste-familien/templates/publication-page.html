<section class="page publication-page">
  <div class="page-content">
    <header class="page-header">
      <div class="section-label">{{sectionLabel}}</div>
      <h1>{{title}}</h1>
      <p class="subtitle">{{subtitle}}</p>
    </header>
    <div class="publication-main">
      <div class="publication-book-title">{{bookTitle}}</div>
      <div class="publication-book-subtitle">{{bookSubtitle}}</div>
    </div>
    <div class="publication-grid">
      {{details}}
    </div>
    <div class="publication-disclaimer">{{disclaimer}}</div>
  </div>
  {{footer}}
</section>
